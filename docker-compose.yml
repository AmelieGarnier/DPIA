# ============================================================
# DPIA Platform — docker-compose.yml
# Repo : https://github.com/ameliegarnier/DPIA
#
# Ports :
#   PIA CNIL → http://<IP-VM-GRC>:8080
#   MONARC   → http://<IP-VM-GRC>:8888
#
# Aucun conflit avec la stack SOC existante :
#   Wazuh  : 1514 / 1515 / 55000
#   TheHive: 9000 | Cortex: 9001 | Shuffle: 3001
# ============================================================

services:

  # ────────────────────────────────────────────────────────────
  # PIA CNIL — Outil officiel d'analyse d'impact RGPD (Art. 35)
  # Source : https://github.com/LINCnil/pia
  # Node 22 requis par Angular 20 (node:18 incompatible).
  # Build Angular au 1er démarrage (~15 min) ; persisté via volume.
  # ────────────────────────────────────────────────────────────
  pia:
    image: node:22-alpine
    container_name: pia-cnil
    working_dir: /app
    volumes:
      - pia-app:/app/pia                          # persiste clone + build entre redémarrages
      - ./pia-init.sh:/docker-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PIA_PORT=8080
    networks:
      dpia-net:
        ipv4_address: 172.30.0.10
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    labels:
      - "project=dpia-portfolio"
      - "tool=pia-cnil"
      - "rgpd.article=35"

  # ────────────────────────────────────────────────────────────
  # MONARC — Base de données MariaDB
  # ────────────────────────────────────────────────────────────
  monarc-db:
    image: mariadb:10.11
    container_name: monarc-db
    environment:
      MARIADB_ROOT_PASSWORD: ${MONARC_DB_ROOT_PASSWORD}
      MARIADB_DATABASE: monarc_cli
      MARIADB_USER: monarc
      MARIADB_PASSWORD: ${MONARC_DB_PASSWORD}
    volumes:
      - monarc-db:/var/lib/mysql
    networks:
      dpia-net:
        ipv4_address: 172.30.0.20
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    labels:
      - "project=dpia-portfolio"
      - "tool=monarc"

  # ────────────────────────────────────────────────────────────
  # MONARC — Application PHP (analyse de risques ISO 27005)
  # Image communautaire — monarc-local incompatible avec les
  # images ghcr.io/monarc-project actuelles (composer.json absent).
  # Identifiants par défaut : admin@admin.localhost / admin
  # ────────────────────────────────────────────────────────────
  monarc:
    image: mitexleo/monarc.lu:latest
    container_name: monarc-app
    depends_on:
      monarc-db:
        condition: service_healthy
    environment:
      - DB_HOST=monarc-db
      - DB_USER=monarc
      - DB_PASSWORD=${MONARC_DB_PASSWORD}
      - DB_ROOT_PASSWORD=${MONARC_DB_ROOT_PASSWORD}
    volumes:
      - monarc-app:/var/www/html/data
    ports:
      - "8888:80"
    networks:
      dpia-net:
        ipv4_address: 172.30.0.21
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    labels:
      - "project=dpia-portfolio"
      - "tool=monarc"
      - "standard=iso27005"

# ──────────────────────────────────────────────────────────────
networks:
  dpia-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  pia-app:
  monarc-db:
  monarc-app:
